name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: apps/scene-editor/.nvmrc
          cache: npm

      - run: npm ci

      - run: npm run check --workspaces --if-present

      - run: npm run test --workspaces --if-present

      # Uses the root "build" script, not a raw --workspaces sweep: packages/*
      # must build in dependency (topological) order for their own dist-based
      # type resolution to succeed (a package's build needs its dependencies'
      # dist/*.d.ts to already exist). See package.json's "build:packages".
      - run: npm run build
